<aside class="w-80 border-r border-slate-800 bg-slate-900/30 flex flex-col">
  <a routerLink="/" class="p-6 border-b border-slate-800 flex items-center gap-3 hover:bg-slate-800/50 transition-colors">
    <svg lucideIcon="home" class="text-indigo-500 w-5 h-5"></svg>
    <h2 class="font-bold text-lg text-white">Home</h2>
  </a>
  <div class="p-4 border-b border-slate-800 flex items-center gap-2 text-slate-400">
    <svg lucideIcon="history" class="w-4 h-4 text-slate-400"></svg>
    <span class="text-xs font-bold uppercase tracking-widest">History</span>
  </div>
  <div class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
    <ng-container *ngIf="history.length === 0; else historyList">
      <p class="text-slate-500 text-sm text-center mt-10 italic">No history yet</p>
    </ng-container>
    <ng-template #historyList>
      <a
        *ngFor="let item of history"
        [routerLink]="['/', item.uploadId]"
        class="block p-4 rounded-xl border transition-all cursor-pointer group"
        [ngClass]="activeId === item.uploadId ? 'bg-indigo-600/10 border-indigo-500' : 'bg-slate-900/50 border-slate-800 hover:border-slate-600'"
      >
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-slate-800 rounded-lg group-hover:bg-indigo-600/20 transition-colors">
            <svg lucideIcon="video" class="w-4 h-4 text-slate-400 group-hover:text-indigo-400"></svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-medium truncate text-slate-200 group-hover:text-white transition-colors">{{ item.originalName || item.filename }}</p>
            <p class="text-[10px] text-slate-500">
              {{ item.timestamps | date:'shortDate' }} • {{ item.timestamps | date:'shortTime' }}
            </p>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-[9px] uppercase font-black tracking-widest"
            [ngClass]="{
              'text-emerald-500': item.status === 'completed',
              'text-rose-500': item.status === 'failed',
              'text-amber-500': item.status !== 'completed' && item.status !== 'failed'
            }">
            {{ item.status }}
          </span>
          <svg lucideIcon="play" class="w-3 h-3 text-slate-600 group-hover:text-indigo-400 opacity-0 group-hover:opacity-100 transition-all"></svg>
        </div>
      </a>
    </ng-template>
  </div>
</aside>
